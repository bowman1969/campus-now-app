<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampUs Link! Splash Page</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-card">
        <header class="topbar">
          <div class="logo">
            <img src="images/logo.png" alt="CampUs Link logo" />
          </div>

          <nav class="top-links">
            <a href="#" class="nav-link">Sign Up</a>
            <span class="divider">|</span>
            <a href="#" class="nav-link">Login</a>

            <label for="avatarUpload" class="profile-icon" data-tooltip="Upload image">
              <img id="avatarPreview" src="images/avatar_default.png" alt="" />
            </label>
          </nav>

          <input type="file" id="avatarUpload" accept="image/*" hidden />
        </header>

        <div class="hero-bottom">
          <h2 class="hero-rotator" id="heroRotator" aria-live="polite">
            <span class="hero-static">Where</span>
            <span class="hero-stage" id="heroStage">
              <span class="hero-stage-inner" id="heroStageInner"></span>
            </span>
          </h2>

          <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit</p>

          <div class="stars">
            <img src="images/stars.png" alt="rating" />
          </div>
        </div>
      </div>
    </section>

    <section class="features">
      <div class="carousel-shell">
        <div class="carousel-viewport">
          <div class="feature-track" id="featureTrack">
            <article class="feature-card">smart<br />calendar</article>
            <article class="feature-card">efficiency<br />timer</article>
            <article class="feature-card">community<br />hub</article>
            <article class="feature-card">campus<br />events</article>
            <article class="feature-card">study<br />groups</article>
            <article class="feature-card">local<br />deals</article>
            <article class="feature-card">club<br />finder</article>
            <article class="feature-card">student<br />resources</article>
          </div>
        </div>

        <div class="carousel-controls">
          <button class="carousel-arrow left-arrow" id="prevBtn" aria-label="Previous features"></button>
          <button class="carousel-arrow right-arrow" id="nextBtn" aria-label="Next features"></button>
        </div>
      </div>

      <div class="cta">
        <h3>Join Now!</h3>
        <p>Start your free account today!</p>
        <a href="#" class="signup-btn" id="signupBtn">Sign Up!</a>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
