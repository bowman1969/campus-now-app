<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community</title>
  <link rel="icon" type="image/png" href="images/tag.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/community.css" />
</head>
<body>
  <main class="page page-template community-page">
    <section class="hero template-hero">
      <div class="hero-card template-card">
        <header class="topbar topbar-template">
          <div class="logo">
            <a href="index.html" aria-label="CampUs Link home">
              <img src="images/logo.png" alt="CampUs Link logo" />
            </a>
          </div>

          <nav class="main-nav" aria-label="Primary desktop navigation">
            <a href="resources.html" class="main-nav-link">resources</a>
            <a href="tasks.html" class="main-nav-link">toolkit</a>
            <a href="calendar.html" class="main-nav-link">calendar</a>
            <a href="community.html" class="main-nav-link">community</a>
          </nav>

          <div class="topbar-tools">
            <form class="searchbar" role="search">
              <label class="sr-only" for="siteSearch">Search</label>
              <input
                type="search"
                id="siteSearch"
                name="q"
                placeholder="search"
                aria-label="Search"
              />
              <button type="submit" class="search-btn" id="searchBtn" aria-label="Submit search">
                <img
                  id="searchIcon"
                  src="images/search-icon.png"
                  alt=""
                  data-default="images/search-icon.png"
                  data-active="images/search-click.png"
                />
              </button>
            </form>

            <a href="home.html" class="home-btn" aria-label="Home">
              <img
                id="homeIcon"
                src="images/home.png"
                data-default="images/home.png"
                data-hover="images/home_hover.png"
                alt="Home"
              />
            </a>
          </div>
        </header>

        <div class="template-overlay-content community-template-overlay">
          <div class="profile-chip">
            <label for="avatarUpload" class="profile-icon profile-icon-template" data-tooltip="Change image">
              <img id="avatarPreview" src="images/avatar_default.png" alt="Profile avatar" />
            </label>

            <span class="profile-name page-title" data-page="community"></span>
          </div>

          <input type="file" id="avatarUpload" accept="image/*" hidden />

          <section class="community-dashboard" aria-label="Community hub content">
            <div class="community-dashboard__inner">
              <div class="community-tiles" aria-label="Community hub links">
                <a href="messages.html" class="community-tile">
                  <span class="community-tile__label">Message<br />Board</span>
                </a>

                <a href="study.html" class="community-tile">
                  <span class="community-tile__label">Study<br />Groups</span>
                </a>

                <a href="meetups.html" class="community-tile">
                  <span class="community-tile__label">Meet<br />Ups</span>
                </a>

                <a href="spirit.html" class="community-tile">
                  <span class="community-tile__label">School<br />Spirit</span>
                </a>
              </div>

              <section class="community-events" aria-labelledby="communityEventsHeading">
                <h2 class="community-events__title" id="communityEventsHeading">Events</h2>

                <div class="community-list-viewport" id="communityListViewport" aria-label="Community events list">
                  <div class="community-list-track" id="communityEventList"></div>
                </div>
              </section>
            </div>
          </section>
        </div>
      </div>
    </section>

    <footer class="bottom-nav">
      <nav class="bottom-nav-inner" aria-label="Primary mobile navigation">
        <a href="resources.html" class="bottom-pill">resources</a>
        <a href="tasks.html" class="bottom-pill">toolkit</a>
        <a href="calendar.html" class="bottom-pill">calendar</a>
        <a href="community.html" class="bottom-pill">community</a>
      </nav>
    </footer>
  </main>

  <script src="js/script.js"></script>
  <script src="js/community.js"></script>
</body>
</html>
