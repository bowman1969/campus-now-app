<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampUs Link! Splash Page</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-card">
        <header class="topbar">
          <div class="logo">
            <img src="images/logo.png" alt="CampUs Link logo" />
          </div>
          <nav class="top-links">
            <span>Sign Up</span>
            <span>|</span>
            <span>Login</span>
            <span class="profile-icon">◔</span>
          </nav>
        </header>

        <div class="hero-copy">
          <h1>
            Clever<br />
            Headline<br />
            Here!
          </h1>
        </div>

        <div class="hero-bottom">
          <h2>Sales pitch FPO</h2>
          <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit</p>
          
          
          <!-- stars -->
          <div class="stars">
            <img src="images/stars.png" alt="rating" />
          </div>

        </div>
      </div>
    </section>

    <section class="features">
      <div class="carousel-shell">
        <div class="carousel-viewport">
          <div class="feature-track" id="featureTrack">
            <article class="feature-card">smart<br />calendar</article>
            <article class="feature-card">efficiency<br />timer</article>
            <article class="feature-card">community<br />hub</article>
            <article class="feature-card">campus<br />events</article>
            <article class="feature-card">study<br />groups</article>
            <article class="feature-card">local<br />deals</article>
            <article class="feature-card">club<br />finder</article>
            <article class="feature-card">student<br />resources</article>
          </div>
        </div>
      </div>

      <div class="cta">
        <h3>Join Now!</h3>
        <p>Lorem ipsum dolor sit amet, consectetur</p>
        <a href="#" class="signup-btn">Sign Up!</a>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
