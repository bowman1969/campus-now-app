<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampUs Link! Splash Page</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-card">
        <header class="topbar">
          <div class="logo">CampUs Link!</div>
          <nav class="top-links">
            <span>Sign Up</span>
            <span>|</span>
            <span>Login</span>
            <span class="profile-icon">◔</span>
          </nav>
        </header>

        <div class="hero-copy">
          <h1>Clever Headline Here!</h1>
        </div>

        <div class="hero-bottom">
          <h2>Sales pitch FPO</h2>
          <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit</p>
          
          
          <!-- might go back to this for stars <div class="stars">★★★★☆</div> -->

          <div class="stars">
            <span class="star full">★</span>
            <span class="star full">★</span>
            <span class="star full">★</span>
            <span class="star full">★</span>
            <span class="star half">★</span>
          </div>

        </div>
      </div>
    </section>

    <section class="features">
      <div class="feature-grid">
        <article class="feature-card">smart<br />calendar</article>
        <article class="feature-card">efficiency<br />timer</article>
        <article class="feature-card">community<br />hub</article>
      </div>

      <div class="carousel-controls">
        <button class="circle-btn" id="prevBtn">❮</button>
        <button class="circle-btn" id="nextBtn">❯</button>
      </div>

      <div class="cta">
        <h3>Join Now!</h3>
        <p>Lorem ipsum dolor sit amet, consectetur</p>
        <a href="#" class="signup-btn">Sign Up!</a>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
